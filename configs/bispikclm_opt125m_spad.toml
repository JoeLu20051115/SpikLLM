[model]
vocab_size = 50272
hidden_size = 768
intermediate_size = 3072
num_attention_heads = 12
num_hidden_layers = 12
max_position_embeddings = 2048
pad_token_id = 1
bos_token_id = 2
eos_token_id = 2
num_steps = 2
spike_threshold = 0.7
tau = 0.9
membrane_decay = 0.9
spike_surrogate = "arctan"
surrogate_alpha = 2.0
teacher_model_id = "facebook/opt-125m"

[distillation]
temperature = 2.0
lambda_emb = 0.2
lambda_attn = 0.1
lambda_feat = 0.1
lambda_soft = 0.3
lambda_hard = 0.3
gamma_attn = 0.5
gamma_feat = 0.5

[training]
teacher_model = "facebook/opt-125m"
output_dir = "output/bispikclm-opt125m-spad"
learning_rate = 5e-4
batch_size = 16
gradient_accumulation_steps = 16
max_steps = 100000
target_tokens = 1000000000
warmup_ratio = 0.2
gradient_clip = 0.7
sequence_length = 2048
time_steps = 4
num_workers = 0
checkpoint_interval = 1000
precision = "bf16"
use_wandb = false
wandb_project = "bispikclm"
log_interval = 1

[data]
dataset_name = "HuggingFaceFW/fineweb-edu"
dataset_config = "sample-10BT"
split = "train"
